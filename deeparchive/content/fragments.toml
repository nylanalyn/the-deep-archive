force = ["The obstruction yields and the way beyond is exposed.", "The seal breaks without damaging what it protected.", "You hold the passage long enough for the evidence to be recovered.", "The mechanism gives up its hidden compartment.", "What was barricaded can now be examined."]
ritual = ["The pattern answers within the limits you prepared.", "The ward settles and reveals what had been concealed.", "The invoked name binds itself to the record.", "The circle closes cleanly around the anomaly.", "The Archive accepts the rite and preserves its result."]

