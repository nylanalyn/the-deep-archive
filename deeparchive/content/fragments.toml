# The Deep Archive — Atmospheric fragments.
#
# The Archivist's voice library. Hand-authored, composed by the engine, never
# generated. Each section maps a key (theme key, tier name, or 'default') to a
# list of short lines. The engine picks one line at random when it needs prose
# for that context.
#
# Per SPEC: prefer short lines, prefer silence over filler, let gaps do work.
# Restrained horror, not constant dramatic narration.

[file_openings]
# Spoken when a File opens, keyed by theme. 'default' is the fallback.
default = [
    "A new file lies open on the reading desk.",
    "The Archivist sets a folder before you, unmarked.",
    "Another file. The lamp does not flicker, but the room feels thinner.",
]
darkness = [
    "A new file lies open on the reading desk. The lamp gutters.",
    "The Archivist sets a folder before you. It smells of damp.",
    "The file is cold to the touch. So is the air around it.",
]
flood = [
    "Water stains creep across the new file's edges.",
    "The folder drips, though nothing above is wet.",
    "You hear water before you see the file. The Archivist does not comment.",
]
geometry = [
    "The file lies open at an angle the room does not allow.",
    "The folder has more pages than its thickness should permit.",
    "The Archivist sets the file down. It does not sit flat.",
]

[archive_returns]
# Spoken when investigators return to the Archive after a File resolves.
default = [
    "You return to the Archive. The lamps are still lit.",
    "The Archivist shelves the closed file without comment.",
    "The Archive is quiet. So are you.",
    "You find yourselves back among the shelves. The reading lamp waits.",
]
success = [
    "You return to the Archive. A space has already been cleared on the shelf.",
    "The reading-room lamps seem warmer when you return.",
]
failure = [
    "You return to the Archive. One lamp has gone out.",
    "The Archivist receives the unfinished record without reproach.",
]
disaster = [
    "You return to the Archive, though the shelves do not seem to recognize you.",
    "The doors close behind you. Somewhere below, a catalogue drawer opens.",
]

[archive_descriptions]
default = [
    "The Deep Archive extends beyond the reach of its reading lamps.",
    "Shelves rise into shadow. The catalogue waits in ordered silence.",
    "The reading room is exactly where you left it. One chair is not.",
    "Dust rests on the long tables except where a folder was recently moved.",
]
reliquary = [
    "The Archive keeps its recovered relics behind glass that reflects no faces.",
    "A locked cabinet stands among the shelves. Its contents have earned their silence.",
]

[room_weather]
default = [
    "Rain traces the high windows, though the forecast was clear.",
    "A dry wind moves between shelves that have no windows.",
    "Fog presses faintly against the glass above the Stacks.",
    "The weather beyond the windows is the color of old paper.",
]

[room_moods]
default = [
    "The lamps are steady. The eastern aisle is not.",
    "No bells have rung for several hours. This is unusual.",
    "A book cart waits at the end of an aisle no one has entered.",
    "The catalogue drawers are closed. One of them is breathing.",
]
settled = [
    "The lamps burn evenly. For now, the shelves appear content.",
    "The catalogue rests in good order. The Archivist does not mention this.",
]
unsettled = [
    "The lamps have been turned low since the last File was shelved.",
    "Several books have shifted spine-inward. No one admits to touching them.",
]

[personnel_titles]
new = ["Newly Catalogued"]
active = ["Field Investigator", "Known Reader"]
veteran = ["Senior Investigator", "Keeper of Closed Files"]
marked = ["Marked Investigator", "Reader in Altered Condition"]

[action_verbs]
investigate = ["search", "trace", "compare", "reconstruct", "follow"]
interview = ["question", "seek testimony from", "compare accounts with", "press", "speak quietly with"]
force = ["pry open", "break through", "drag aside", "hold shut", "wrench loose"]
ritual = ["inscribe a ward around", "burn a careful offering before", "invoke the name beneath", "draw a circle around", "recite the old catalogue over"]

[action_targets]
investigate = ["the water-stained accession records", "a sequence of misfiled photographs", "the notes left by a missing clerk", "an aisle omitted from the floor plan", "the dust beneath the evidence cabinet"]
interview = ["the night porter", "a witness who refuses to sit", "the residents of the condemned boarding house", "a retired cataloguer", "the constable assigned to the first disappearance"]
force = ["the swollen archive door", "a cabinet sealed with black wax", "the collapsed service passage", "a book cart lodged against the stairwell", "the chained door beneath the reading room"]
ritual = ["the unnumbered threshold", "a page written in iron ink", "the object recovered from the east wing", "the name erased from the register", "the cold space inside the circle"]

[action_methods]
investigate = ["under a failing desk lamp", "while the ink is still changing", "against records that insist nothing happened", "before the trail goes cold", "with the oldest catalogue as your guide"]
interview = ["away from listening walls", "with the Archivist recording every omission", "before their account changes again", "over untouched cups of tea", "in the narrow light of the reading room"]
force = ["with measured pressure", "before the hinges remember they are locked", "while something pushes from the other side", "using a length of shelving as leverage", "despite the warning scratched into the frame"]
ritual = ["by lamplight", "without speaking the final word", "as the shelves settle around you", "using thread taken from the File", "while the Archive keeps count"]

[action_successes]
investigate = ["A hidden correspondence becomes clear.", "The evidence yields a usable trail.", "A missing interval in the record is finally accounted for.", "The catalogue reveals where the File was altered.", "You recover a detail someone worked hard to erase."]
interview = ["The witness gives you the one detail they meant to withhold.", "Their contradictions resolve into a useful account.", "A name and location survive comparison with the Archive's records.", "The testimony confirms the pattern.", "The witness remembers what happened after they stopped remembering."]
force = ["The obstruction yields and the way beyond is exposed.", "The seal breaks without damaging what it protected.", "You hold the passage long enough for the evidence to be recovered.", "The mechanism gives up its hidden compartment.", "What was barricaded can now be examined."]
ritual = ["The pattern answers within the limits you prepared.", "The ward settles and reveals what had been concealed.", "The invoked name binds itself to the record.", "The circle closes cleanly around the anomaly.", "The Archive accepts the rite and preserves its result."]

[action_failures]
investigate = ["The evidence contradicts itself until nothing useful remains.", "The trail dissolves into unrelated catalogue entries.", "Someone has removed the necessary pages too carefully.", "The recovered detail leads only to another absence.", "The records close around their secret."]
interview = ["The account fragments under scrutiny and yields nothing reliable.", "The witness retreats into a rehearsed silence.", "Every useful detail changes when repeated.", "The testimony belongs to someone who was never there.", "The witness leaves before the central question is answered."]
force = ["The obstruction holds, and something beyond it takes notice.", "The seal bends without breaking.", "The passage shifts its weight against you.", "The mechanism locks more deeply into place.", "The attempted breach exposes only another barrier."]
ritual = ["The rite completes incorrectly and leaves no usable answer.", "The invoked presence refuses the terms of the circle.", "The ward gutters out before the pattern settles.", "The final symbol changes beneath your hand.", "Something answers, but not in a form the File can use."]

[resolution_tiers]
# Spoken at resolution, by tier. Tiers run worst-to-best.
disaster = [
    "The file closes itself. Something has been lost that will not return.",
    "The Archive is dimmer now. The Archivist says nothing.",
]
failure = [
    "The file is filed away, incomplete. It will not be opened again.",
    "The Archivist closes the folder slowly. 'Not this time.'",
]
mixed_failure = [
    "The file closes, half-finished. Some questions remain in the dark.",
    "The Archivist shelves the folder with a glance you cannot read.",
]
partial_success = [
    "The file closes, mostly resolved. One loose thread remains.",
    "The Archivist marks the folder, then thinks better of it.",
]
success = [
    "The file is complete. The Archivist marks it closed.",
    "The folder sits finished on the desk. The lamp steadies.",
]
clean_success = [
    "The file closes cleanly. The Archive seems, briefly, at rest.",
    "The Archivist shelves the folder with something almost like satisfaction.",
]
