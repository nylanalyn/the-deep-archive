[archive_truths]
# The spine of the whole game: one line surfaced each time the room breaks a
# Sealed File, in order, building toward what the Archive actually is. These
# are PLACEHOLDER lore — rewrite freely; the machinery just speaks spine[N]
# on the Nth boss victory. Keep them ordered from first-given to final-truth.
spine = [
    "The first truth, freely given: the Archive was not built to keep books. The books came later, as cover.",
    "It keeps readers. Every File you close files a little more of you in return.",
    "The scars are not wounds. They are catalogue marks. You have been indexed.",
    "No one staffs the Archive. 'The Archivist' is a role it wears, and the role is always filled from within.",
    "The doors have not been locked in a very long time. They have simply stopped leading out.",
    "Every investigator who reached this depth is already on the black index, their names crossed twice.",
    "You are not solving the Archive. You are being read by it, one File at a time.",
    "The last truth, and the Archive's alone to give: it does not want to keep you. It has only forgotten how to let go.",
]
