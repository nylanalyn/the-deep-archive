# Hidden recurring patterns. The Archivist does not announce progress.

[meta_arcs.black_index]
name = "The Black Index"
theme_key = "darkness"
trigger_count = 3
title = "The Sealed Index of Absent Names"
location = "the locked catalogue beneath the Stacks"
opening = "A black-tabbed file waits beneath the reading lamp. Your names are already inside."
tags = ["darkness", "void", "sealed"]
threshold = 18
reward_key = "index_key"
reward_name = "Key to the Black Index"
reward_description = "Opens catalogue drawers whose labels have been carefully removed."
hints = [
    "A name from an earlier File appears in the margin, crossed out twice.",
    "The Archivist finds a black index tab where none was filed.",
]

[meta_arcs.drowned_register]
name = "The Drowned Register"
theme_key = "flood"
trigger_count = 3
title = "The Register Beneath the Waterline"
location = "the submerged accession vault"
opening = "The sealed folder is wet. A tide moves behind its pages."
tags = ["flood", "water", "sealed"]
threshold = 18
reward_key = "drowned_seal"
reward_name = "Seal of the Drowned Register"
reward_description = "Remains dry even when the shelf around it is underwater."
hints = [
    "The accession number matches a water-damaged File already closed.",
    "A line of damp fingerprints continues onto an older shelf.",
]

[meta_arcs.folding_room]
name = "The Folding Room"
theme_key = "geometry"
trigger_count = 3
title = "The Room Filed Inside Itself"
location = "the sealed landing beyond the Map Room"
opening = "The File has no spine. It opens in four directions at once."
tags = ["geometry", "space", "sealed"]
threshold = 18
reward_key = "brass_protractor"
reward_name = "Brass Protractor"
reward_description = "Measures angles the Archive has agreed to tolerate."
hints = [
